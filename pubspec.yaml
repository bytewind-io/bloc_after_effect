name: bloc_after_effect
description: >-
  An extension of Bloc that adds a one-shot UI side-effect stream alongside
  state, for navigation, dialogs, snackbars, and other fire-and-forget actions.
version: 0.2.0
repository: https://github.com/bytewind-io/bloc_after_effect
issue_tracker: https://github.com/bytewind-io/bloc_after_effect/issues
topics:
  - bloc
  - flutter-bloc
  - state-management
  - side-effects

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  bloc: ^8.1.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
